<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bright Dental Cad</title>

<link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f141a, #07090c);
  color: #eaeaea;
}

/* HEADER */
header {
  background: linear-gradient(180deg, #050607, #0a0f14);
  color: #fff;
  padding: 50px 20px;
  text-align: center;
  border-bottom: 1px solid rgba(0,255,170,0.08);
}

header h1 {
  font-size: 2.8em;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #00f5c4, #00a97f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

header p {
  color: #8fa3a3;
  margin-top: 10px;
}

/* MENU */
nav a {
  color: #00f5c4;
  margin: 0 15px;
  text-decoration: none;
  transition: 0.3s;
  position: relative;
}

nav a::after {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  bottom: -4px;
  left: 0;
  background: #00f5c4;
  transition: 0.3s;
}

nav a:hover::after {
  width: 100%;
}

nav a:hover {
  color: #ffffff;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

h2 {
  color: #00f5c4;
  font-size: 2.2em;
  margin-bottom: 20px;
  position: relative;
}

h2::after {
  content: "";
  width: 50px;
  height: 3px;
  background: #00f5c4;
  display: block;
  margin: 10px auto 0;
}

/* CARDS */
.card {
  background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border: 1px solid rgba(0,255,170,0.1);
  border-radius: 18px;
  padding: 25px;
  backdrop-filter: blur(8px);
  transition: 0.35s ease;
}

.card:hover {
  transform: translateY(-8px) scale(1.01);
  box-shadow: 0 0 30px rgba(0,255,170,0.15);
  border: 1px solid rgba(0,255,170,0.25);
}

.card h3 {
  color: #00f5c4;
  margin-bottom: 10px;
}

/* BOTÕES */
.btn {
  padding: 12px 24px;
  background: linear-gradient(135deg, #00f5c4, #00a97f);
  border: none;
  border-radius: 10px;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  box-shadow: 0 0 20px rgba(0,255,170,0.5);
  transform: scale(1.05);
}

/* GALERIA */
.gallery img {
  border-radius: 14px;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.06);
  box-shadow: 0 0 25px rgba(0,255,170,0.25);
}

/* FAQ */
.faq-item {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(0,255,170,0.08);
  border-radius: 12px;
  margin-bottom: 12px;
}

.faq-question {
  color: #00f5c4;
  padding: 15px;
}

.faq-answer {
  color: #b5c7c7;
}

/* CONTATO */
.contact-box {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(0,255,170,0.15);
  border-radius: 16px;
  transition: 0.3s;
}

.contact-box:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(0,255,170,0.2);
}

.contact-box i {
  color: #00f5c4;
}

.contact-box a {
  color: #00f5c4;
}

/* FOOTER */
footer {
  background: #030405;
  border-top: 1px solid rgba(0,255,170,0.08);
}

.impact {
  color: #00f5c4;
}

/* BOTÃO WHATSAPP */
.float-btn {
  background: linear-gradient(135deg, #00f5c4, #00a97f);
  color: #000;
  box-shadow: 0 0 15px rgba(0,255,170,0.3);
}

.float-btn:hover {
  transform: scale(1.05);
}

/* CHAT */
.chat-popup {
  background: #0d1117;
  border: 1px solid rgba(0,255,170,0.2);
}

.chat-popup textarea {
  background: #050607;
  color: #fff;
  border: 1px solid #222;
}
</body>
</html>
